<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sofia Accessories</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Marcellus&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
<style>
:root{
  --cream:#FBF6F1;
  --cream-2:#F5EBE3;
  --plum:#5C2148;
  --plum-deep:#3E1530;
  --rose:#E8AFC0;
  --rose-soft:#F2D4DD;
  --gold:#C9A961;
  --gold-soft:#E3D2A4;
  --charcoal:#2B2530;
  --ink-soft:#7A6F76;
  --white:#FFFFFF;
  --success:#5E8C61;
  --shadow-plum: 0 14px 40px -12px rgba(60,20,50,0.35);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--cream);
  color:var(--charcoal);
  font-family:'Cairo','Marcellus',sans-serif;
  -webkit-font-smoothing:antialiased;
}
#root{min-height:100vh;}
.font-display{font-family:'Marcellus','Playfair Display',serif;}
::selection{background:var(--rose-soft);}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;}

/* Scrollbar */
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:var(--cream-2);}
::-webkit-scrollbar-thumb{background:var(--rose);border-radius:8px;}

/* Focus visibility */
button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible{
  outline:2px solid var(--plum);
  outline-offset:2px;
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
}

/* ===== Decorative texture ===== */
.texture-dots{
  background-image: radial-gradient(circle, rgba(92,33,72,0.08) 1px, transparent 1px);
  background-size: 18px 18px;
}

.ribbon-divider{
  height:3px;
  background:linear-gradient(90deg, transparent, var(--gold) 20%, var(--gold) 80%, transparent);
  border-radius:3px;
}

/* Jewelry box card */
.jewel-card{
  position:relative;
  background:var(--white);
  border-radius:18px;
  overflow:hidden;
  box-shadow: 0 8px 24px -10px rgba(60,20,50,0.18);
  transition: transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s ease;
  border:1px solid rgba(92,33,72,0.07);
}
.jewel-card:hover{
  transform: translateY(-6px);
  box-shadow: var(--shadow-plum);
}
.jewel-card .lid{
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, var(--plum), var(--plum-deep));
  display:flex;
  align-items:center;
  justify-content:center;
  transform-origin:top;
  transition: transform .5s cubic-bezier(.34,1.56,.64,1);
  z-index:2;
}
.jewel-card:hover .lid{
  transform: rotateX(-110deg);
}
.badge-new{
  position:absolute; top:10px; left:10px; z-index:3;
  background:var(--gold); color:var(--plum-deep);
  font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px;
  letter-spacing:.5px;
}
.badge-offer{
  position:absolute; top:10px; right:10px; z-index:3;
  background:var(--plum); color:var(--gold-soft);
  font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px;
}

/* Buttons */
.btn-primary{
  background:var(--plum);
  color:var(--white);
  border:none;
  padding:13px 26px;
  border-radius:30px;
  font-weight:700;
  font-size:15px;
  transition: all .25s ease;
  box-shadow: 0 8px 20px -6px rgba(92,33,72,0.5);
}
.btn-primary:hover{ background:var(--plum-deep); transform:translateY(-2px);}
.btn-primary:disabled{ opacity:.5; cursor:not-allowed; transform:none;}
.btn-ghost{
  background:transparent;
  border:1.5px solid var(--plum);
  color:var(--plum);
  padding:11px 24px;
  border-radius:30px;
  font-weight:600;
  transition:all .25s ease;
}
.btn-ghost:hover{ background:var(--plum); color:var(--white);}
.btn-gold{
  background:linear-gradient(135deg,var(--gold),#B6904A);
  color:var(--plum-deep);
  border:none;
  padding:13px 26px;
  border-radius:30px;
  font-weight:700;
  transition:all .25s ease;
}
.btn-gold:hover{ transform:translateY(-2px); box-shadow:0 8px 18px -6px rgba(201,169,97,0.6);}

.chip{
  padding:8px 18px;
  border-radius:30px;
  font-size:14px;
  font-weight:600;
  border:1.5px solid var(--rose-soft);
  background:var(--white);
  color:var(--ink-soft);
  transition:all .2s ease;
  white-space:nowrap;
}
.chip.active{
  background:var(--plum);
  border-color:var(--plum);
  color:var(--white);
}

.input-field{
  width:100%;
  padding:12px 16px;
  border-radius:12px;
  border:1.5px solid var(--cream-2);
  background:var(--white);
  font-size:15px;
  transition:border-color .2s ease;
}
.input-field:focus{ border-color:var(--rose); outline:none;}

/* Floating WhatsApp */
.wa-float{
  position:fixed;
  bottom:24px;
  left:24px;
  z-index:50;
  display:flex;
  align-items:center;
  gap:10px;
  background:#25D366;
  color:#fff;
  padding:13px 20px;
  border-radius:50px;
  box-shadow:0 10px 30px -8px rgba(37,211,102,0.6);
  font-weight:700;
  font-size:14px;
  animation: floatPulse 3s ease-in-out infinite;
}
.wa-float:hover{ transform:scale(1.05); }
@keyframes floatPulse{
  0%,100%{ box-shadow:0 10px 30px -8px rgba(37,211,102,0.6);}
  50%{ box-shadow:0 10px 38px -4px rgba(37,211,102,0.85);}
}

/* Cart drawer */
.drawer-overlay{
  position:fixed; inset:0; background:rgba(43,37,48,0.5);
  z-index:60; backdrop-filter:blur(2px);
  animation:fadeIn .25s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.drawer{
  position:fixed; top:0; right:0; height:100%; width:min(420px,92vw);
  background:var(--cream); z-index:61;
  box-shadow:-10px 0 40px rgba(0,0,0,0.2);
  animation:slideIn .3s cubic-bezier(.2,.8,.2,1);
  display:flex; flex-direction:column;
}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}

.modal-overlay{
  position:fixed; inset:0; background:rgba(43,37,48,0.55);
  z-index:70; display:flex; align-items:center; justify-content:center;
  padding:20px; backdrop-filter:blur(2px);
  animation:fadeIn .2s ease;
}
.modal-box{
  background:var(--white); border-radius:20px; max-width:480px; width:100%;
  max-height:90vh; overflow-y:auto;
  animation:popIn .25s cubic-bezier(.2,.8,.2,1);
}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}

.toast{
  position:fixed; bottom:30px; right:50%; transform:translateX(50%);
  background:var(--plum-deep); color:#fff; padding:14px 26px; border-radius:14px;
  z-index:90; font-weight:600; box-shadow:0 10px 30px -8px rgba(0,0,0,0.4);
  animation: toastIn .3s cubic-bezier(.2,.8,.2,1);
  display:flex; align-items:center; gap:10px;
}
@keyframes toastIn{from{opacity:0;transform:translate(50%,20px)}to{opacity:1;transform:translate(50%,0)}}

.skeleton{
  background:linear-gradient(90deg, var(--cream-2) 25%, #fff 37%, var(--cream-2) 63%);
  background-size:400% 100%;
  animation:shimmer 1.4s ease infinite;
  border-radius:10px;
}
@keyframes shimmer{0%{background-position:100% 50%}100%{background-position:0 50%}}

.tab-btn{
  padding:10px 20px; border-radius:12px; font-weight:700; border:none; background:transparent;
  color:var(--ink-soft); transition:all .2s ease; font-size:14px; display:flex; align-items:center; gap:8px;
}
.tab-btn.active{ background:var(--plum); color:#fff; }
.tab-btn:hover:not(.active){ background:var(--cream-2); }

table{ width:100%; border-collapse:collapse; }
th{ text-align:right; padding:12px 14px; font-size:13px; color:var(--ink-soft); font-weight:700; border-bottom:2px solid var(--cream-2);}
td{ padding:14px; border-bottom:1px solid var(--cream-2); font-size:14px; vertical-align:middle;}
tr.row-hover:hover{ background:var(--cream-2); }

.status-pill{
  font-size:12px; font-weight:700; padding:5px 12px; border-radius:20px; display:inline-block;
}
.status-new{ background:#FDE8D8; color:#B5651D;}
.status-progress{ background:#DCE8F5; color:#2A5C8A;}
.status-done{ background:#DCF0DC; color:#2E7D32;}
.status-cancel{ background:#F5DCDC; color:#B53A3A;}

.mobile-search-btn{ display:none; }

@media (max-width: 768px){
  .hide-mobile{ display:none !important; }
  .mobile-search-btn{ display:flex; }
}
</style>
</head>

/* ============ STORAGE HELPERS (Supabase) ============ */
// This site stores its data (products, orders, settings) in a Supabase project
// instead of relying on any Claude.ai-only storage API, so the live, hosted
// version of this site works from any browser, anywhere, for real customers.
//
// SETUP REQUIRED — replace these two values with your own Supabase project's
// credentials before publishing (see the setup guide provided alongside this
// file). Until you do, the site will show a clear on-screen setup notice
// instead of silently failing.
const SUPABASE_URL = "https://ldpsqpzqvxodwrhmkiri.supabase.co"; // e.g. "https://abcdefgh.supabase.co"
const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY"; // the "anon" public API key

const SUPABASE_CONFIGURED = SUPABASE_URL !== "https://ldpsqpzqvxodwrhmkiri.supabase.co" && SUPABASE_ANON_KEY !== "sb_publishable_oGJXXD3IlbDCtgGmOBUd9A_w-mfOMpZ";

const SUPABASE_TABLE = "sofia_store_data";
const SUPABASE_REST_URL = `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}`;

function supabaseHeaders(extra){
  return {
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
    "Content-Type": "application/json",
    ...extra
  };
}

async function loadShared(key, fallback){
  if(!SUPABASE_CONFIGURED) return fallback;
  try{
    const url = `${SUPABASE_REST_URL}?key=eq.${encodeURIComponent(key)}&select=value`;
    const res = await fetch(url, { headers: supabaseHeaders() });
    if(!res.ok) return fallback;
    const rows = await res.json();
    if(rows && rows.length > 0 && rows[0].value !== undefined && rows[0].value !== null){
      return rows[0].value;
    }
    return fallback;
  }catch(e){
    console.error("Supabase load failed", key, e);
    return fallback;
  }
}

async function saveShared(key, value){
  if(!SUPABASE_CONFIGURED) return false;
  try{
    const res = await fetch(SUPABASE_REST_URL, {
      method: "POST",
      headers: supabaseHeaders({ "Prefer": "resolution=merge-duplicates" }),
      body: JSON.stringify([{ key, value }])
    });
    if(!res.ok){
      const errText = await res.text().catch(()=>"");
      console.error("Supabase save failed", key, res.status, errText);
      return false;
    }
    return true;
  }catch(e){
    console.error("Supabase save failed", key, e);
    return false;
  }
}

/* ============ TOAST ============ */
function useToast(){
  const [toast, setToast] = useState(null);
  const show = useCallback((msg, icon)=>{
    setToast({msg, icon, id: uid()});
  },[]);
  useEffect(()=>{
    if(!toast) return;
    const t = setTimeout(()=> setToast(null), 2600);
    return ()=> clearTimeout(t);
  },[toast]);
  return [toast, show];
}

function Toast({toast}){
  if(!toast) return null;
  return (
    <div className="toast" role="status">
      {toast.icon === 'check' && <Icon name="check-circle" size={20} />}
      {toast.icon === 'cart' && <Icon name="shopping-bag" size={20} />}
      <span>{toast.msg}</span>
    </div>
  );
}

/* ============ ICON (fully React-owned SVG tree, no DOM shortcuts) ============ */
// LUCIDE_ICONS[Key] is a structure like ["svg", {attrs}, [["path",{d:...}],["path",{d:...}]]].
// We convert that directly into real React elements (React.createElement), so React
// owns every node from the start. This avoids any conflict between React's fiber tree
// and externally-injected DOM (which is what caused removeChild crashes when using
// dangerouslySetInnerHTML or DOM-mutating icon libraries), and -- since the icon set
// is embedded above instead of loaded from a CDN -- icons always render even if a
// network/proxy/ad-blocker blocks third-party script domains.
function toPascalCase(name){
  return name.split('-').map(p=> p.charAt(0).toUpperCase()+p.slice(1)).join('');
}
function iconDefToReactEl(def, extraProps, keyPrefix){
  if(!Array.isArray(def)) return null;
  const [tag, attrs, children] = def;
  const props = {...(attrs||{}), ...(extraProps||{})};
  // React requires camelCase/special-cased SVG attrs
  if(props['stroke-width']!=null){ props.strokeWidth = props['stroke-width']; delete props['stroke-width']; }
  if(props['stroke-linecap']!=null){ props.strokeLinecap = props['stroke-linecap']; delete props['stroke-linecap']; }
  if(props['stroke-linejoin']!=null){ props.strokeLinejoin = props['stroke-linejoin']; delete props['stroke-linejoin']; }
  if(props['fill-rule']!=null){ props.fillRule = props['fill-rule']; delete props['fill-rule']; }
  if(props['clip-rule']!=null){ props.clipRule = props['clip-rule']; delete props['clip-rule']; }
  const kids = Array.isArray(children) ? children.map((c,i)=> iconDefToReactEl(c, null, keyPrefix+'-'+i)) : null;
  return React.createElement(tag, {...props, key: keyPrefix}, kids);
}
function Icon({name, size=18, style={}, className=""}){
  const key = toPascalCase(name);
  const def = LUCIDE_ICONS[key];
  if(!def){
    return <span className={className} style={{width:size, height:size, display:'inline-block', ...style}} aria-hidden="true"></span>;
  }
  const svgEl = iconDefToReactEl(def, {width:size, height:size}, 'i');
  return (
    <span
      className={className}
      style={{width:size, height:size, display:'inline-flex', alignItems:'center', justifyContent:'center', lineHeight:0, flexShrink:0, ...style}}
      aria-hidden="true"
    >
      {svgEl}
    </span>
  );
}

function StoreApp({goAdmin}){
  const [products, setProducts] = useState(null); // null = loading
  const [search, setSearch] = useState("");
  const [activeCategory, setActiveCategory] = useState("all");
  const [filterOffersOnly, setFilterOffersOnly] = useState(false);
  const [sortBy, setSortBy] = useState("featured");
  const [quickViewProduct, setQuickViewProduct] = useState(null);
  const [orderProduct, setOrderProduct] = useState(null); // product currently being ordered via Easy Order
  const [toast, showToast] = useToast();

  useLucideRefresh([products, search, activeCategory, quickViewProduct, orderProduct, filterOffersOnly, sortBy]);

  useEffect(()=>{
    (async ()=>{
      const data = await loadShared('sofia:products', null);
      if(data && Array.isArray(data) && data.length){
        setProducts(data);
      } else {
        setProducts(DEFAULT_PRODUCTS);
        await saveShared('sofia:products', DEFAULT_PRODUCTS);
      }
    })();
  }, []);

  const filteredProducts = useMemo(()=>{
    if(!products) return [];
    let list = [...products];
    if(activeCategory !== 'all') list = list.filter(p=>p.category===activeCategory);
    if(filterOffersOnly) list = list.filter(p=>p.isOffer);
    if(search.trim()){
      const q = search.trim().toLowerCase();
      list = list.filter(p=> p.name.toLowerCase().includes(q) || (CATEGORY_LABELS[p.category]||"").includes(q) || p.desc.toLowerCase().includes(q));
    }
    if(sortBy === 'price-asc') list.sort((a,b)=>a.price-b.price);
    else if(sortBy === 'price-desc') list.sort((a,b)=>b.price-a.price);
    else if(sortBy === 'newest') list.sort((a,b)=> (b.isNew?1:0)-(a.isNew?1:0));
    return list;
  }, [products, activeCategory, search, filterOffersOnly, sortBy]);

  const whatsappLink = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent("أهلاً، عندي استفسار من متجر Sofia Accessories")}`;

  return (
    <div style={{minHeight:'100vh', display:'flex', flexDirection:'column'}}>
      <StoreHeader
        search={search}
        setSearch={setSearch}
        goAdmin={goAdmin}
      />

      <HeroSection />

      <CategoryFilterBar
        activeCategory={activeCategory}
        setActiveCategory={setActiveCategory}
        filterOffersOnly={filterOffersOnly}
        setFilterOffersOnly={setFilterOffersOnly}
        sortBy={sortBy}
        setSortBy={setSortBy}
      />

      <main style={{flex:1, padding:'10px 6vw 60px', maxWidth:1400, margin:'0 auto', width:'100%'}}>
        {products === null ? (
          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(230px,1fr))', gap:22}}>
            {Array.from({length:8}).map((_,i)=> (
              <div key={i} className="skeleton" style={{height:320, borderRadius:18}}></div>
            ))}
          </div>
        ) : filteredProducts.length === 0 ? (
          <div style={{textAlign:'center', padding:'80px 20px'}}>
            <Icon name="search-x" size={56} style={{color:'var(--rose)'}} />
            <h3 className="font-display" style={{fontSize:22, marginTop:16}}>لا توجد منتجات مطابقة</h3>
            <p style={{color:'var(--ink-soft)'}}>جربي تبديل الفلتر أو كلمة البحث</p>
          </div>
        ) : (
          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(230px,1fr))', gap:24}}>
            {filteredProducts.map(p=> (
              <ProductCard key={p.id} product={p} onOrder={()=>setOrderProduct(p)} onView={()=>setQuickViewProduct(p)} />
            ))}
          </div>
        )}
      </main>

      <SiteFooter whatsappLink={whatsappLink} goAdmin={goAdmin} />

      <a href={whatsappLink} target="_blank" rel="noopener noreferrer" className="wa-float" aria-label="تواصل معنا على واتساب">
        <Icon name="message-circle" size={22} />
        <span>تواصل واتساب</span>
      </a>

      {quickViewProduct && (
        <QuickViewModal
          product={quickViewProduct}
          onClose={()=>setQuickViewProduct(null)}
          onOrder={(qty)=>{ setOrderProduct({...quickViewProduct, _qty: qty}); setQuickViewProduct(null); }}
        />
      )}

      {orderProduct && (
        <EasyOrderModal
          product={orderProduct}
          onClose={()=>setOrderProduct(null)}
          onSuccess={()=>{
            // Deferred to the next tick: calling these synchronously right after an
            // awaited async operation can race with React's commit phase while this
            // modal (and its children) are being unmounted, causing DOM reconciliation
            // errors. Deferring lets the current commit finish cleanly first.
            setTimeout(()=>{
              setOrderProduct(null);
              showToast("تم استلام طلبك بنجاح! سنتواصل معك قريباً", "check");
            }, 0);
          }}
        />
      )}

      <Toast toast={toast} />
    </div>
  );
}

function EasyOrderModal({product, onClose, onSuccess}){
  const qty = product._qty || 1;
  const total = product.price * qty;
  const [form, setForm] = useState({ name:"", phone:"", address:"", payment:"cod", notes:"" });
  const [showNotes, setShowNotes] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [errors, setErrors] = useState({});
  useLucideRefresh([form, showNotes]);

  const update = (field, value)=> setForm(f=>({...f, [field]: value}));

  const validate = ()=>{
    const e = {};
    if(!form.name.trim()) e.name = "من فضلك اكتبي اسمك";
    if(!form.phone.trim() || !/^[0-9+\s]{8,15}$/.test(form.phone.trim())) e.phone = "رقم تليفون غير صحيح";
    if(!form.address.trim()) e.address = "من فضلك اكتبي عنوانك بالتفصيل";
    return e;
  };

  const submit = async (e)=>{
    e.preventDefault();
    const errs = validate();
    setErrors(errs);
    if(Object.keys(errs).length>0) return;
    setSubmitting(true);
    try{
      const order = {
        id: uid(),
        createdAt: new Date().toISOString(),
        customer: { name: form.name.trim(), phone: form.phone.trim(), address: form.address.trim(), city: "" },
        payment: form.payment,
        packaging: "normal",
        notes: form.notes.trim(),
        items: [{ id: product.id, name: product.name, price: product.price, qty }],
        total,
        status: "new"
      };
      const existing = await loadShared('sofia:orders', []);
      const updated = [order, ...existing];
      const ok = await saveShared('sofia:orders', updated);
      if(!ok) throw new Error("failed to save");
      // Don't touch local state after this: onSuccess() causes the parent to close
      // this modal (unmount), and setting state afterward on an unmounting
      // component can crash React's commit phase. Return immediately.
      onSuccess();
      return;
    }catch(err){
      setErrors({general: SUPABASE_CONFIGURED
        ? "حصل خطأ في حفظ الطلب، جربي تاني"
        : "الموقع لسه مش متوصل بقاعدة البيانات. لو إنتِ صاحبة المتجر، راجعي ملف شرح الإعداد."});
      setSubmitting(false);
    }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()} style={{maxWidth:460}}>
        <div style={{padding:'22px 24px 0', display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
          <div style={{display:'flex', alignItems:'center', gap:8}}>
            <span style={{background:'var(--gold-soft)', color:'#8a6d2f', fontSize:11, fontWeight:800, padding:'4px 10px', borderRadius:20, display:'inline-flex', alignItems:'center', gap:4}}>
              <Icon name="zap" size={12} /> اطلب سريع
            </span>
          </div>
          <button onClick={onClose} style={{background:'none', border:'none'}} aria-label="إغلاق"><Icon name="x" size={20} /></button>
        </div>
        <form onSubmit={submit} style={{padding:'10px 24px 24px'}}>
          <div style={{display:'flex', gap:12, alignItems:'center', background:'var(--cream)', borderRadius:14, padding:12, marginBottom:18}}>
            <img src={product.image} alt={product.name} style={{width:54, height:54, borderRadius:10, objectFit:'cover', flexShrink:0}} />
            <div style={{flex:1, minWidth:0}}>
              <div style={{fontWeight:700, fontSize:14}}>{product.name}{qty>1 ? ` × ${qty}` : ''}</div>

          <button type="submit" className="btn-primary" style={{width:'100%', marginTop:20, display:'flex', alignItems:'center', justifyContent:'center', gap:8}} disabled={submitting}>

function AdminApp({goStore, logout}){
  const [tab, setTab] = useState('orders');
  const [products, setProducts] = useState(null);
  const [orders, setOrders] = useState(null);
  const [toast, showToast] = useToast();
  useLucideRefresh([tab, products, orders]);

  const refreshProducts = useCallback(async ()=>{
    const data = await loadShared('sofia:products', DEFAULT_PRODUCTS);
    setProducts(data);
  }, []);
  const refreshOrders = useCallback(async ()=>{
    const data = await loadShared('sofia:orders', []);
    setOrders(data);
  }, []);

  useEffect(()=>{ refreshProducts(); refreshOrders(); }, [refreshProducts, refreshOrders]);

  const persistProducts = async (list)=>{
    setProducts(list);
    await saveShared('sofia:products', list);
  };
  const persistOrders = async (list)=>{
    setOrders(list);
    await saveShared('sofia:orders', list);
  };

  return (
    <div style={{minHeight:'100vh', background:'var(--cream)', display:'flex'}}>
      <AdminSidebar tab={tab} setTab={setTab} goStore={goStore} logout={logout} ordersCount={orders ? orders.filter(o=>o.status==='new').length : 0} />
      <div style={{flex:1, minWidth:0}}>
        <AdminTopbar tab={tab} />
        <main style={{padding:'24px 28px 60px', maxWidth:1300}}>
          {tab === 'orders' && (
            <OrdersTab orders={orders} setOrders={persistOrders} showToast={showToast} />
          )}
          {tab === 'products' && (
            <ProductsTab products={products} setProducts={persistProducts} showToast={showToast} />
          )}
          {tab === 'offers' && (
            <OffersTab products={products} setProducts={persistProducts} showToast={showToast} />
          )}
          {tab === 'settings' && (
            <SettingsTab showToast={showToast} />
          )}
        </main>
      </div>
      <Toast toast={toast} />
    </div>
  );
}

/* ----------- ORDERS TAB ----------- */
function OrdersTab({orders, setOrders, showToast}){
  const [statusFilter, setStatusFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [selectedOrder, setSelectedOrder] = useState(null);

  if(orders === null){
    return <div style={{display:'grid', gap:14}}>{Array.from({length:4}).map((_,i)=><div key={i} className="skeleton" style={{height:70}}></div>)}</div>;
  }

  const filtered = orders.filter(o=>{
    if(statusFilter !== 'all' && o.status !== statusFilter) return false;
    if(search.trim()){
      const q = search.trim().toLowerCase();
      return o.customer.name.toLowerCase().includes(q) || o.customer.phone.includes(q);
    }
    return true;
  });

  const updateStatus = (orderId, status)=>{
    const updated = orders.map(o=> o.id===orderId ? {...o, status} : o);
    setOrders(updated);
    showToast("تم تحديث حالة الطلب", "check");
  };

  const deleteOrder = (orderId)=>{
    if(!confirm("تأكيد حذف الطلب؟")) return;
    setOrders(orders.filter(o=>o.id!==orderId));
    showToast("تم حذف الطلب", "check");
    setSelectedOrder(null);
  };

  const stats = [
    {label:'كل الطلبات', value: orders.length, icon:'clipboard-list', color:'var(--plum)'},
    {label:'جديدة', value: orders.filter(o=>o.status==='new').length, icon:'sparkle', color:'#B5651D'},
    {label:'قيد التحضير', value: orders.filter(o=>o.status==='progress').length, icon:'loader', color:'#2A5C8A'},
    {label:'تم التسليم', value: orders.filter(o=>o.status==='done').length, icon:'check-circle', color:'#2E7D32'},
  ];

  return (
    <div>
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))', gap:14, marginBottom:22}}>
        {stats.map(s=> (
          <div key={s.label} style={{background:'#fff', borderRadius:16, padding:'16px 18px', boxShadow:'0 6px 18px -10px rgba(92,33,72,0.15)'}}>
            <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
              <Icon name={s.icon} size={18} style={{color:s.color}} />
              <span style={{fontSize:24, fontWeight:800, color:'var(--plum-deep)'}}>{s.value}</span>
            </div>
            <div style={{fontSize:13, color:'var(--ink-soft)', marginTop:6}}>{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{display:'flex', gap:10, marginBottom:16, flexWrap:'wrap', alignItems:'center'}}>
        <div style={{display:'flex', gap:6, flexWrap:'wrap'}}>
          {[{id:'all',label:'الكل'}, {id:'new',label:'جديد'}, {id:'progress',label:'قيد التحضير'}, {id:'done',label:'تم التسليم'}, {id:'cancel',label:'ملغي'}].map(f=> (
            <button key={f.id} className={`chip ${statusFilter===f.id?'active':''}`} onClick={()=>setStatusFilter(f.id)}>{f.label}</button>
          ))}
        </div>
        <input className="input-field" style={{maxWidth:220, marginRight:'auto'}} placeholder="بحث بالاسم أو الرقم..." value={search} onChange={e=>setSearch(e.target.value)} />
      </div>

      {filtered.length === 0 ? (
        <div style={{textAlign:'center', padding:'60px 20px', background:'#fff', borderRadius:16}}>
          <Icon name="inbox" size={44} style={{color:'var(--rose)'}} />
          <p style={{color:'var(--ink-soft)', marginTop:12}}>لا توجد طلبات مطابقة</p>
        </div>
      ) : (
        <div style={{background:'#fff', borderRadius:16, overflow:'hidden', boxShadow:'0 6px 18px -10px rgba(92,33,72,0.15)'}}>
          <div style={{overflowX:'auto'}}>
            <table>
              <thead>
                <tr>
                  <th>العميلة</th>
                  <th className="hide-mobile">الهاتف</th>
                  <th className="hide-mobile">المحافظة</th>
                  <th>الإجمالي</th>
                  <th>الحالة</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(o=> (
                  <tr key={o.id} className="row-hover" style={{cursor:'pointer'}} onClick={()=>setSelectedOrder(o)}>
                    <td style={{fontWeight:700}}>{o.customer.name}</td>
                    <td className="hide-mobile">{o.customer.phone}</td>
                    <td className="hide-mobile">{o.customer.city}</td>
                    <td style={{fontWeight:700, color:'var(--plum)'}}>{o.total} ج.م</td>
                    <td>
                      <span className={`status-pill status-${o.status}`}>{STATUS_LABELS[o.status]}</span>
                    </td>
                    <td>
                      <button onClick={(e)=>{e.stopPropagation(); setSelectedOrder(o);}} style={{background:'none', border:'none', color:'var(--plum)'}}>
                        <Icon name="chevron-left" size={18} />
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {selectedOrder && (
        <OrderDetailModal order={selectedOrder} onClose={()=>setSelectedOrder(null)} onUpdateStatus={updateStatus} onDelete={deleteOrder} />
      )}
    </div>
  );
}

/* ----------- PRODUCTS TAB ----------- */
function ProductsTab({products, setProducts, showToast}){
  const [editing, setEditing] = useState(null); // product object or 'new'
  const [search, setSearch] = useState('');
  const [categoryFilter, setCategoryFilter] = useState('all');

  if(products === null){
    return <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))', gap:16}}>{Array.from({length:6}).map((_,i)=><div key={i} className="skeleton" style={{height:200}}></div>)}</div>;
  }

  const filtered = products.filter(p=>{
    if(categoryFilter!=='all' && p.category!==categoryFilter) return false;
    if(search.trim() && !p.name.toLowerCase().includes(search.trim().toLowerCase())) return false;
    return true;
  });

  const saveProduct = (product)=>{
    let updated;
    if(product.id && products.find(p=>p.id===product.id)){
      updated = products.map(p=> p.id===product.id ? product : p);
      showToast("تم تعديل المنتج", "check");
    } else {
      updated = [{...product, id: uid()}, ...products];
      showToast("تمت إضافة المنتج", "check");
    }
    setProducts(updated);
    setEditing(null);
  };

  const deleteProduct = (id)=>{
    if(!confirm("تأكيد حذف المنتج؟")) return;
    setProducts(products.filter(p=>p.id!==id));
    showToast("تم حذف المنتج", "check");
  };

  return (
    <div>
      <div style={{display:'flex', justifyContent:'space-between', flexWrap:'wrap', gap:12, marginBottom:18}}>
        <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
          <button className={`chip ${categoryFilter==='all'?'active':''}`} onClick={()=>setCategoryFilter('all')}>الكل</button>
          {Object.entries(CATEGORY_LABELS).map(([id,label])=> (
            <button key={id} className={`chip ${categoryFilter===id?'active':''}`} onClick={()=>setCategoryFilter(id)}>{label}</button>
          ))}
        </div>
        <div style={{display:'flex', gap:10}}>
          <input className="input-field" style={{maxWidth:200}} placeholder="بحث..." value={search} onChange={e=>setSearch(e.target.value)} />
          <button onClick={()=>setEditing('new')} className="btn-primary" style={{display:'flex', alignItems:'center', gap:6, whiteSpace:'nowrap'}}>
            <Icon name="plus" size={16} /> منتج جديد
          </button>
        </div>
      </div>

      {filtered.length === 0 ? (
        <div style={{textAlign:'center', padding:'60px 20px', background:'#fff', borderRadius:16}}>
          <Icon name="package-x" size={44} style={{color:'var(--rose)'}} />
          <p style={{color:'var(--ink-soft)', marginTop:12}}>لا توجد منتجات</p>
        </div>
      ) : (
        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(250px,1fr))', gap:16}}>
          {filtered.map(p=> (
            <div key={p.id} style={{background:'#fff', borderRadius:16, overflow:'hidden', boxShadow:'0 6px 18px -10px rgba(92,33,72,0.15)'}}>
              <div style={{display:'flex', gap:12, padding:14}}>
                <img src={p.image} alt={p.name} style={{width:64, height:64, borderRadius:10, objectFit:'cover', flexShrink:0}} />
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontWeight:700, fontSize:14, marginBottom:2}}>{p.name}</div>
                  <div style={{fontSize:12, color:'var(--gold)'}}>{CATEGORY_LABELS[p.category]}</div>
                  <div style={{fontSize:14, fontWeight:800, color:'var(--plum)', marginTop:4}}>{p.price} ج.م</div>
                </div>
              </div>
              <div style={{display:'flex', gap:6, padding:'0 14px 14px', alignItems:'center'}}>
                <span style={{fontSize:12, color: p.stock>0 ? 'var(--success)' : '#B53A3A', fontWeight:700}}>{p.stock>0 ? `متوفر: ${p.stock}`:'نفذ المخزون'}</span>
                <div style={{flex:1}}></div>
                {p.isNew && <span style={{fontSize:10, background:'var(--gold-soft)', color:'#8a6d2f', padding:'2px 8px', borderRadius:10, fontWeight:700}}>جديد</span>}
                {p.isOffer && <span style={{fontSize:10, background:'var(--rose-soft)', color:'var(--plum)', padding:'2px 8px', borderRadius:10, fontWeight:700}}>عرض</span>}
              </div>
              <div style={{display:'flex', borderTop:'1px solid var(--cream-2)'}}>
                <button onClick={()=>setEditing(p)} style={{flex:1, padding:'10px', background:'none', border:'none', color:'var(--plum)', fontWeight:700, fontSize:13, display:'flex', alignItems:'center', justifyContent:'center', gap:6}}>
                  <Icon name="pencil" size={14} /> تعديل
                </button>
                <div style={{width:1, background:'var(--cream-2)'}}></div>
                <button onClick={()=>deleteProduct(p.id)} style={{flex:1, padding:'10px', background:'none', border:'none', color:'#B53A3A', fontWeight:700, fontSize:13, display:'flex', alignItems:'center', justifyContent:'center', gap:6}}>
                  <Icon name="trash-2" size={14} /> حذف
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {editing && (
        <ProductEditModal product={editing==='new' ? null : editing} onClose={()=>setEditing(null)} onSave={saveProduct} />
      )}
    </div>
  );
}

function ProductEditModal({product, onClose, onSave}){
  const [form, setForm] = useState(product ? {...product, colors: product.colors?.join(', ') || ''} : {
    name:'', category:'earrings', price:'', oldPrice:'', stock:10, isNew:false, isOffer:false, desc:'', colors:'', image:''
  });
  const [errors, setErrors] = useState({});
  useLucideRefresh([form]);

  const update = (field, value)=> setForm(f=>({...f, [field]: value}));

  const submit = (e)=>{
    e.preventDefault();
    const errs = {};
    if(!form.name.trim()) errs.name = "اكتبي اسم المنتج";
    if(!form.price || isNaN(Number(form.price)) || Number(form.price)<=0) errs.price = "سعر غير صحيح";
    if(!form.image.trim()) errs.image = "رابط الصورة مطلوب";
    setErrors(errs);
    if(Object.keys(errs).length>0) return;
    onSave({
      id: product?.id,
      name: form.name.trim(),
      category: form.category,
      price: Number(form.price),
      oldPrice: form.oldPrice ? Number(form.oldPrice) : null,
      stock: Number(form.stock) || 0,
      isNew: !!form.isNew,
      isOffer: !!form.isOffer,
      desc: form.desc.trim(),
      colors: form.colors.split(',').map(c=>c.trim()).filter(Boolean),
      image: form.image.trim()
    });
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()} style={{maxWidth:520}}>
        <div style={{padding:'22px 24px 0', display:'flex', justifyContent:'space-between'}}>
          <h2 className="font-display" style={{fontSize:20, margin:0}}>{product ? 'تعديل المنتج' : 'منتج جديد'}</h2>
          <button onClick={onClose} style={{background:'none', border:'none'}} aria-label="إغلاق"><Icon name="x" size={20} /></button>
        </div>
        <form onSubmit={submit} style={{padding:'16px 24px 24px', display:'grid', gap:14}}>
          <div>
            <label style={{fontSize:13, fontWeight:700, display:'block', marginBottom:6}}>اسم المنتج</label>
            <input className="input-field" value={form.name} onChange={e=>update('name', e.target.value)} />
            {errors.name && <p style={{color:'#B53A3A', fontSize:12, marginTop:4}}>{errors.name}</p>}
          </div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
            <div>
              <label style={{fontSize:13, fontWeight:700, display:'block', marginBottom:6}}>التصنيف</label>
              <select className="input-field" value={form.category} onChange={e=>update('category', e.target.value)}>
                {Object.entries(CATEGORY_LABELS).map(([k,l])=> <option key={k} value={k}>{l}</option>)}
              </select>
            </div>
            <div>
              <label style={{fontSize:13, fontWeight:700, display:'block', marginBottom:6}}>الكمية بالمخزون</label>
              <input className="input-field" type="number" value={form.stock} onChange={e=>update('stock', e.target.value)} />
            </div>
          </div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
            <div>
              <label style={{fontSize:13, fontWeight:700, display:'block', marginBottom:6}}>السعر (ج.م)</label>
              <input className="input-field" type="number" value={form.price} onChange={e=>update('price', e.target.value)} />
              {errors.price && <p style={{color:'#B53A3A', fontSize:12, marginTop:4}}>{errors.price}</p>}
            </div>
            <div>
              <label style={{fontSize:13, fontWeight:700, display:'block', marginBottom:6}}>السعر قبل الخصم (اختياري)</label>
              <input className="input-field" type="number" value={form.oldPrice} onChange={e=>update('oldPrice', e.target.value)} />
            </div>
          </div>
          <div>
            <label style={{fontSize:13, fontWeight:700, display:'block', marginBottom:6}}>رابط الصورة</label>
            <input className="input-field" value={form.image} onChange={e=>update('image', e.target.value)} placeholder="https://..." />
            {errors.image && <p style={{color:'#B53A3A', fontSize:12, marginTop:4}}>{errors.image}</p>}
          </div>
          <div>
            <label style={{fontSize:13, fontWeight:700, display:'block', marginBottom:6}}>الألوان المتوفرة (مفصولة بفاصلة)</label>
            <input className="input-field" value={form.colors} onChange={e=>update('colors', e.target.value)} placeholder="ذهبي, فضي, وردي" />
          </div>
          <div>
            <label style={{fontSize:13, fontWeight:700, display:'block', marginBottom:6}}>الوصف</label>
            <textarea className="input-field" rows={3} value={form.desc} onChange={e=>update('desc', e.target.value)}></textarea>
          </div>
          <div style={{display:'flex', gap:18}}>
            <label style={{display:'flex', alignItems:'center', gap:8, fontSize:14, fontWeight:600}}>
              <input type="checkbox" checked={form.isNew} onChange={e=>update('isNew', e.target.checked)} /> منتج جديد
            </label>
            <label style={{display:'flex', alignItems:'center', gap:8, fontSize:14, fontWeight:600}}>
              <input type="checkbox" checked={form.isOffer} onChange={e=>update('isOffer', e.target.checked)} /> عرض خاص
            </label>
          </div>
          <button type="submit" className="btn-primary" style={{width:'100%', marginTop:6}}>{product ? 'حفظ التعديلات' : 'إضافة المنتج'}</button>
        </form>
      </div>
    </div>
  );
}

/* ----------- OFFERS TAB ----------- */
function OffersTab({products, setProducts, showToast}){
  const [discountModal, setDiscountModal] = useState(null);

  if(products === null){
    return <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))', gap:16}}>{Array.from({length:4}).map((_,i)=><div key={i} className="skeleton" style={{height:160}}></div>)}</div>;
  }

  const offerProducts = products.filter(p=>p.isOffer);
  const nonOfferProducts = products.filter(p=>!p.isOffer);

  const toggleOffer = (id)=>{
    setProducts(products.map(p=> p.id===id ? {...p, isOffer:!p.isOffer} : p));
  };

  const removeOldPrice = (id)=>{
    setProducts(products.map(p=> p.id===id ? {...p, oldPrice:null} : p));
  };

  return (
    <div>
      <div style={{background:'linear-gradient(135deg, var(--plum), var(--plum-deep))', borderRadius:18, padding:'22px 26px', color:'#fff', marginBottom:24, display:'flex', alignItems:'center', gap:16, flexWrap:'wrap'}}>
        <div style={{width:54, height:54, borderRadius:'50%', background:'rgba(255,255,255,0.15)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
          <Icon name="badge-percent" size={26} style={{color:'var(--gold-soft)'}} />
        </div>
        <div style={{flex:1, minWidth:200}}>
          <div style={{fontWeight:800, fontSize:16}}>{offerProducts.length} منتج عليه عرض حالياً</div>
          <div style={{fontSize:13, color:'rgba(255,255,255,0.75)', marginTop:2}}>منتجات العروض تظهر ببادج "عرض خاص" في المتجر وتقدري تفلتري عليها</div>
        </div>
      </div>

      <h3 className="font-display" style={{fontSize:18, marginBottom:14}}>منتجات عليها عرض ({offerProducts.length})</h3>
      {offerProducts.length === 0 ? (
        <div style={{textAlign:'center', padding:'40px 20px', background:'#fff', borderRadius:16, marginBottom:30}}>
          <Icon name="tag" size={36} style={{color:'var(--rose)'}} />
          <p style={{color:'var(--ink-soft)', marginTop:10}}>لا توجد عروض حالياً، اختاري منتج من القائمة تحت لتضيفيه للعروض</p>
        </div>
      ) : (
        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))', gap:14, marginBottom:30}}>
          {offerProducts.map(p=> (
            <div key={p.id} style={{background:'#fff', borderRadius:16, padding:14, display:'flex', gap:12, boxShadow:'0 6px 18px -10px rgba(92,33,72,0.15)'}}>
              <img src={p.image} alt={p.name} style={{width:56, height:56, borderRadius:10, objectFit:'cover'}} />
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontWeight:700, fontSize:13.5}}>{p.name}</div>
                <div style={{display:'flex', alignItems:'baseline', gap:8, marginTop:4}}>
                  <span style={{fontWeight:800, color:'var(--plum)'}}>{p.price} ج.م</span>
                  {p.oldPrice ? <span style={{fontSize:12, color:'var(--ink-soft)', textDecoration:'line-through'}}>{p.oldPrice} ج.م</span> : (
                    <button onClick={()=>setDiscountModal(p)} style={{fontSize:11, color:'var(--plum)', background:'none', border:'none', textDecoration:'underline'}}>حطي سعر قبل الخصم</button>
                  )}
                </div>
                <div style={{display:'flex', gap:8, marginTop:8}}>
                  {p.oldPrice && <button onClick={()=>removeOldPrice(p.id)} style={{fontSize:11, color:'var(--ink-soft)', background:'none', border:'none'}}>إزالة السعر القديم</button>}
                  <button onClick={()=>toggleOffer(p.id)} style={{fontSize:11, color:'#B53A3A', background:'none', border:'none'}}>إزالة من العروض</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      <h3 className="font-display" style={{fontSize:18, marginBottom:14}}>أضيفي منتج للعروض</h3>
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))', gap:14}}>
        {nonOfferProducts.map(p=> (
          <div key={p.id} style={{background:'#fff', borderRadius:16, padding:14, display:'flex', alignItems:'center', gap:12, boxShadow:'0 6px 18px -10px rgba(92,33,72,0.15)'}}>
            <img src={p.image} alt={p.name} style={{width:48, height:48, borderRadius:10, objectFit:'cover'}} />
            <div style={{flex:1, minWidth:0}}>
              <div style={{fontWeight:700, fontSize:13}}>{p.name}</div>
              <div style={{fontSize:12, color:'var(--plum)', fontWeight:700}}>{p.price} ج.م</div>
            </div>
            <button onClick={()=>setDiscountModal(p)} className="btn-gold" style={{padding:'8px 14px', fontSize:12, whiteSpace:'nowrap'}}>إضافة لعرض</button>
          </div>
        ))}
      </div>

      {discountModal && (
        <DiscountModal
          product={discountModal}
          onClose={()=>setDiscountModal(null)}
          onSave={(oldPrice)=>{
            setProducts(products.map(p=> p.id===discountModal.id ? {...p, isOffer:true, oldPrice: oldPrice || p.oldPrice} : p));
            showToast("تمت إضافة المنتج للعروض", "check");
            setDiscountModal(null);
          }}
        />
      )}
    </div>
  );
}

function DiscountModal({product, onClose, onSave}){
  const [oldPrice, setOldPrice] = useState(product.oldPrice || Math.round(product.price*1.2));
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()} style={{maxWidth:400}}>
        <div style={{padding:24}}>
          <h2 className="font-display" style={{fontSize:18, margin:'0 0 6px'}}>إضافة عرض على: {product.name}</h2>
          <p style={{fontSize:13, color:'var(--ink-soft)', marginBottom:16}}>السعر الحالي للمنتج هو {product.price} ج.م. حددي السعر القديم (قبل الخصم) ليظهر مشطوب في المتجر.</p>
          <label style={{fontSize:13, fontWeight:700, display:'block', marginBottom:6}}>السعر قبل الخصم</label>
          <input className="input-field" type="number" value={oldPrice} onChange={e=>setOldPrice(e.target.value)} />
          <div style={{display:'flex', gap:10, marginTop:18}}>
            <button onClick={onClose} className="btn-ghost" style={{flex:1}}>إلغاء</button>
            <button onClick={()=>onSave(Number(oldPrice))} className="btn-primary" style={{flex:1}}>حفظ العرض</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ----------- SETTINGS TAB ----------- */
function SettingsTab({showToast}){
  const [settings, setSettings] = useState(null);

  useEffect(()=>{
    (async ()=>{
      const data = await loadShared('sofia:settings', {
        whatsapp: DISPLAY_PHONE,
        siteNameEn: SITE_NAME_EN,
        siteNameAr: SITE_NAME_AR,
        instapayNumber: DISPLAY_PHONE,
        announcement: "تشكيلة جديدة كل أسبوع 🌸"
      });
      setSettings(data);
    })();
  }, []);

  if(settings === null){
    return <div className="skeleton" style={{height:300, maxWidth:500}}></div>;
  }

  const update = (field, value)=> setSettings(s=>({...s, [field]: value}));

  const save = async (e)=>{
    e.preventDefault();
    await saveShared('sofia:settings', settings);
    showToast("تم حفظ الإعدادات", "check");
  };

  return (
    <form onSubmit={save} style={{background:'#fff', borderRadius:18, padding:26, maxWidth:520, boxShadow:'0 6px 18px -10px rgba(92,33,72,0.15)', display:'grid', gap:16}}>
      <div>
        <label style={{fontSize:13, fontWeight:700, display:'block', marginBottom:6}}>اسم المتجر (إنجليزي)</label>
        <input className="input-field" value={settings.siteNameEn} onChange={e=>update('siteNameEn', e.target.value)} />
      </div>
      <div>
        <label style={{fontSize:13, fontWeight:700, display:'block', marginBottom:6}}>اسم المتجر (عربي)</label>
        <input className="input-field" value={settings.siteNameAr} onChange={e=>update('siteNameAr', e.target.value)} />
      </div>
      <div>
        <label style={{fontSize:13, fontWeight:700, display:'block', marginBottom:6}}>رقم واتساب التواصل</label>
        <input className="input-field" value={settings.whatsapp} onChange={e=>update('whatsapp', e.target.value)} />
        <p style={{fontSize:12, color:'var(--ink-soft)', marginTop:4}}>ملاحظة: هذا الحقل للعرض فقط. لتغيير الرقم الفعلي لزر واتساب العائم، عدّلي القيمة WHATSAPP_NUMBER في الكود.</p>
      </div>
      <div>
        <label style={{fontSize:13, fontWeight:700, display:'block', marginBottom:6}}>رقم إنستاباي</label>
        <input className="input-field" value={settings.instapayNumber} onChange={e=>update('instapayNumber', e.target.value)} />
      </div>
      <div>
        <label style={{fontSize:13, fontWeight:700, display:'block', marginBottom:6}}>شريط الإعلان في الصفحة الرئيسية</label>
        <input className="input-field" value={settings.announcement} onChange={e=>update('announcement', e.target.value)} />
      </div>
      <button type="submit" className="btn-primary" style={{marginTop:6}}>حفظ الإعدادات</button>
    </form>
  );
}

/* ============ RENDER ============ */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
